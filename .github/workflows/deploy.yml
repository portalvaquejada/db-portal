name: Deploy DB Portal

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Locaweb via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            PROJECT_DIR="/home/portalvaquejada1/db-portal"

            # Criar diretorio se nao existir
            mkdir -p $PROJECT_DIR

            # Clonar ou atualizar o repositorio
            if [ ! -d "$PROJECT_DIR/.git" ]; then
              cd /home/portalvaquejada1
              git clone https://github.com/portalvaquejada/db-portal.git db-portal
            else
              cd $PROJECT_DIR
              git fetch origin main
              git reset --hard origin/main
            fi

            cd $PROJECT_DIR

            # Criar .env se nao existir
            if [ ! -f ".env" ]; then
              cp .env.example .env
              echo "AVISO: Arquivo .env criado a partir do .env.example"
              echo "Configure as senhas antes de iniciar os containers"
            fi

            # Parar containers existentes
            docker compose down || true

            # Subir containers
            docker compose up -d

          timeout: 300s
