name: Deploy DB Portal

on:
  push:
      branches:
            - main

            jobs:
              deploy:
                  name: Deploy
                      runs-on: ubuntu-latest

                          steps:
                                - uses: actions/checkout@v4

                                      - name: Deploy via FTP to Locaweb
                                              uses: locaweb/ftp-deploy@1.0.0
                                                      with:
                                                                host: ${{ secrets.HOST }}
                                                                          user: ${{ secrets.USER }}
                                                                                    password: ${{ secrets.PASS }}
                                                                                              localDir: "."
                                                                                                        remoteDir: "public_html/db-portal"
